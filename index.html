<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java Learning Path — Interaktif</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="hero">
        <div class="container">
            <h1>Java Learning Path</h1>
            <p class="subtitle">Belajar Java dari nol hingga mahir — interaktif, langsung di browser.</p>
            <a href="#modules" class="btn-primary">Mulai Belajar</a>
        </div>
    </header>

    <main class="container">
        <section id="stats" class="stats-bar">
            <div class="stat"><span id="total-lessons">0</span> Pelajaran</div>
            <div class="stat"><span id="total-quizzes">0</span> Kuis</div>
            <div class="stat"><span id="total-time">0</span> Menit perkiraan</div>
        </section>

        <section id="modules" class="modules-grid">
            <!-- Akan diisi oleh app.js -->
        </section>

        <section id="credits" class="credits">
            <p>Dikembangkan oleh Archon • <a href="https://github.com/personalbotai/java-learning-path" target="_blank">GitHub</a> • <a href="https://github.com/personalbotai" target="_blank">personalbotai</a></p>
        </section>
    </main>

    <footer>
        <p>&copy; 2025–2026 Archon. All rights reserved.</p>
    </footer>

    <script src="modules.js"></script>
    <script src="app.js"></script>
</body>
</html>
