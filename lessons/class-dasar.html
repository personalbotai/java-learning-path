<h1>Class dan Object Dasar</h1>

<p>Java adalah bahasa berorientasi objek (OOP). Dua konsep fundamental: <strong>class</strong> dan <object>.</p>

<ul>
<li><strong>Class</strong>: blueprint yang mendefinisikan atribut (field) dan perilaku (method).</li>
<li><strong>Object</strong>: instance dari sebuah class.</li>
</ul>

<h2>Mendefinisikan Class</h2>

<pre><code class="language-java">public class Person {
    // fields (atribut)
    String name;
    int age;

    // method
    void greet() {
        System.out.println("Hello, I'm " + name);
    }
}
</code></pre>

<h2>Membuat Object (Instance)</h2>

<pre><code class="language-java">Person p = new Person(); // instantiation
p.name = "Alice";
p.age = 25;
p.greet(); // output: Hello, I'm Alice
</code></pre>

<h2>Constructor</h2>

<p>Constructor adalah method khusus yang dipanggil saat object dibuat. Nama sama dengan class, tidak ada return type.</p>

<pre><code class="language-java">public class Person {
    String name;
    int age;

    // Constructor default (tanpa parameter)
    public Person() {
        // bisa diisi inisialisasi default
    }

    // Constructor dengan parameter
    public Person(String name, int age) {
        this.name = name;
        this.age = age;
    }
}
</code></pre>

<p>Pakai constructor untuk memastikan object terinisialisasi dengan valid.</p>

<h2>Metode Getter dan Setter</h2>

<p>Untuk encapsulation, fields biasanya private dengan accessor methods:</p>

<pre><code class="language-java">public class Person {
    private String name;
    private int age;

    public String getName() { return name; }
    public void setName(String name) { this.name = name; }

    public int getAge() { return age; }
    public void setAge(int age) { this.age = age; }
}
</code></pre>

<h2>Kata kunci <code>this</code></h2>

<p><code>this</code> merujuk ke instance saat ini. Digunakan untuk membedakan field dengan parameter nama sama, atau memanggil constructor lain (this(...)).</p>

<pre><code class="language-java">public void setName(String name) {
    this.name = name; // 'this.name' field, 'name' parameter
}
</code></pre>

<h2>Overloading Constructor</h2>

<p>Class dapat memiliki lebih dari satu constructor dengan signature berbeda.</p>

<pre><code class="language-java">public Person() { this("Unknown", 0); } // delegasi
public Person(String name) { this(name, 18); }
public Person(String name, int age) { ... }
</code></pre>

<h2>Best Practice</h2>

<ul>
<li>Buat constructor yang menginisialisasi semua field yang diperlukan.</li>
<li>Gunakan getters/setters, hindari public field jika bisa.</li>
<li>Perhatikan immutability: class dengan final fields dan tidak ada setter.</li>
</ul>
